[build]
  publish = "."
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/page/edit.html"
  to = "/page/edit.html"
  status = 200

[[redirects]]
  from = "/page/new.html"
  to = "/page/new.html"
  status = 200

[[redirects]]
  from = "/page/dashboard.html"
  to = "/page/dashboard.html"
  status = 200

[[redirects]]
  from = "/page/*"
  to = "/page/index.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/page/index.html"
  status = 200
